---
name: Basic-Service Continuous-Integration
run-name: CI ${{ github.repository }} - ${{ github.ref }} job 🚀
on:
  push:
    branches: [main]
  pull_request:
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Lint yaml and Ansible configs
        run: |
          python -m pip install --upgrade pip
          pip install ansible-lint==24.12.2 yamllint==1.35.1 ansible-core==2.16.3
          yamllint --config-file ./tests/yaml-lint.yml .
          ansible-lint --config-file ./tests/ansible-lint.yml .

      - name: Validate Helm chart
        run: |
          chmod +x ./tests/helm-validate.sh
          ./tests/helm-validate.sh
  molecule:
    strategy:
      fail-fast: false
      matrix:
        scenario:
          - systemd-basic
          - systemd-full
          - systemd-uninstall
          - container-basic
          - container-binary
          - container-binary-service
          - container-full
          - container-uninstall
          - install-basic
          - install-uninstall
          - k8s-basic
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core==2.17.7 molecule==24.12.0 molecule-docker==2.1.0 pytest-testinfra==10.1.1

      - name: Install Ansible Galaxy dependencies
        run: |
          ansible-galaxy install -r tests/molecule/requirements.yml
          ansible-galaxy collection install -r requirements.yml

      - name: Start Docker
        run: |
          sudo systemctl start docker
          sudo systemctl enable docker

      - name: Run Molecule Test
        timeout-minutes: 20
        run: cd tests && molecule test -s ${{ matrix.scenario }}
