---
name: fixture-service
commonName: fixture-service.local
namespace: fixture
clusterName: fixture-cluster
createNamespace: true
image: nginx:1.27
command: ["/bin/sh", "-c"]
args: ["nginx -g 'daemon off;'"]
minReplicas: 1
maxReplicas: 3
env:
  config:
    EXAMPLE: value
serviceType: ClusterIP
servicePort: 8080
serviceTargetPort: 80
deployStatefulSet: false
hpa:
  enabled: true
  targetCPUUtilizationPercentage: 60
livenessProbe:
  httpGet:
    path: /
    port: 80
readinessProbe:
  httpGet:
    path: /
    port: 80
serviceMonitor:
  enabled: true
  port: http
  path: /metrics
