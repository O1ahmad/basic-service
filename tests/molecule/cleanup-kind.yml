---
- name: Cleanup kind Kubernetes cluster
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    kind_cluster_name: molecule-k8s
    kind_kubeconfig_path: /tmp/molecule-k8s-kubeconfig
  tasks:
    - name: Delete kind cluster
      ansible.builtin.command: kind delete cluster --name {{ kind_cluster_name }}
      failed_when: false
      changed_when: false

    - name: Remove kubeconfig
      ansible.builtin.file:
        path: "{{ kind_kubeconfig_path }}"
        state: absent
