---
- name: Prepare kind Kubernetes cluster
  hosts: localhost
  connection: local
  gather_facts: true
  vars:
    kind_cluster_name: molecule-k8s
    kind_kubeconfig_path: /tmp/molecule-k8s-kubeconfig
    kind_version: v0.27.0
  tasks:
    - name: Install kind
      ansible.builtin.get_url:
        url: "https://kind.sigs.k8s.io/dl/{{ kind_version }}/kind-linux-amd64"
        dest: /usr/local/bin/kind
        mode: "0755"
      become: true

    - name: Lookup stable kubectl version
      ansible.builtin.uri:
        url: https://dl.k8s.io/release/stable.txt
        return_content: true
      register: kubectl_stable_version

    - name: Install kubectl
      ansible.builtin.get_url:
        url: >-
          https://dl.k8s.io/release/{{ kubectl_stable_version.content | trim }}/bin/linux/amd64/kubectl
        dest: /usr/local/bin/kubectl
        mode: "0755"
      become: true

    - name: Check whether Helm is installed
      ansible.builtin.command: helm version
      register: helm_version
      failed_when: false
      changed_when: false

    - name: Install Helm
      ansible.builtin.shell: curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      when: helm_version.rc != 0
      args:
        creates: /usr/local/bin/helm
        executable: /bin/bash
      become: true

    - name: Install Kubernetes Python library
      ansible.builtin.pip:
        name: kubernetes>=28.1.0
        extra_args: --break-system-packages

    - name: Delete existing kind cluster
      ansible.builtin.command: kind delete cluster --name {{ kind_cluster_name }}
      failed_when: false
      changed_when: false

    - name: Create kind cluster
      ansible.builtin.command: kind create cluster --name {{ kind_cluster_name }} --wait 5m
      changed_when: true

    - name: Write kubeconfig for Ansible
      ansible.builtin.command:
        cmd: kind get kubeconfig --name {{ kind_cluster_name }}
      register: kind_kubeconfig
      changed_when: true

    - name: Save kubeconfig for Ansible
      ansible.builtin.copy:
        content: "{{ kind_kubeconfig.stdout }}"
        dest: "{{ kind_kubeconfig_path }}"
        mode: "0600"
